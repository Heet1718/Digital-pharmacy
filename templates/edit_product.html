{% extends "base.html" %} {% block title %}Edit Product - MediStore Pro{%
endblock %} {% block content %}
<div class="section-spacing flex justify-between items-center">
  <div>
    <h1 class="page-title">Edit Product</h1>
    <p class="page-subtitle">Update product details</p>
  </div>
  <a href="{{ url_for('inventory') }}" class="btn-secondary">
    <i class="fas fa-arrow-left"></i> Back to Inventory
  </a>
</div>

<div class="card max-w-4xl">
  <div class="card-body">
    <form
      method="POST"
      action="{{ url_for('edit_product', product_id=product.id) }}"
    >
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="form-label">Medicine Name *</label>
          <input
            type="text"
            name="name"
            required
            value="{{ product.name }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Manufacturer *</label>
          <input
            type="text"
            name="manufacturer"
            required
            value="{{ product.manufacturer }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Price (₹) *</label>
          <input
            type="number"
            step="0.01"
            name="price"
            required
            value="{{ product.price }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Stock Quantity *</label>
          <input
            type="number"
            name="stock_quantity"
            required
            value="{{ product.stock_quantity }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Shelf Location *</label>
          <input
            type="text"
            name="shelf_location"
            required
            value="{{ product.shelf_location }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Category</label>
          <input
            type="text"
            name="category"
            value="{{ product.category or '' }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Min Stock Level</label>
          <input
            type="number"
            name="min_stock_level"
            value="{{ product.min_stock_level or 15 }}"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Batch Number</label>
          <input
            type="text"
            name="batch_number"
            value="{{ product.batch_number or '' }}"
            placeholder="e.g., BATCH123"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Expiry Date</label>
          <input
            type="date"
            name="expiry_date"
            value="{{ product.expiry_date or '' }}"
            class="form-input"
          />
        </div>

        <div class="md:col-span-2">
          <label class="form-label">Usage Type</label>
          <input
            type="text"
            name="usage_type"
            value="{{ product.usage_type or '' }}"
            class="form-input"
          />
        </div>
      </div>

      <div class="flex gap-4 mt-8">
        <button type="submit" class="flex-1 btn-primary">
          <i class="fas fa-save"></i> Update Product
        </button>
        <a href="{{ url_for('inventory') }}" class="flex-1 btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
  {% endblock %}
</div>
