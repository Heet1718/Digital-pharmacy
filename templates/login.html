<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MediStore Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4f46e5",
              accent: "#10b981",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gradient-to-br from-purple-600 via-purple-500 to-indigo-600 min-h-screen flex items-center justify-center p-5"
  >
    <div class="bg-white rounded-md p-10 w-full max-w-md animate-fade-in">
      <div class="text-center mb-8">
        <i class="fas fa-pills text-5xl text-primary mb-4"></i>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">MediStore Pro</h1>
        <p class="text-gray-600 text-sm">Medical Store Billing & Inventory</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="space-y-2 mb-6">
        {% for category, message in messages %}
        <div
          class="px-4 py-3 rounded flex items-center gap-3 bg-red-50 text-red-800 border-l-4 border-red-500"
        >
          <i class="fas fa-exclamation-circle text-lg"></i>
          <span class="text-sm">{{ message }}</span>
        </div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-4">
          <label class="block mb-1.5 text-sm font-medium text-gray-700">
            <i class="fas fa-user mr-2"></i>Username
          </label>
          <input
            type="text"
            name="username"
            id="username"
            required
            placeholder="Enter username"
            class="w-full form-input"
          />
        </div>

        <div class="mb-6">
          <label class="block mb-1.5 text-sm font-medium text-gray-700">
            <i class="fas fa-lock mr-2"></i>Password
          </label>
          <input
            type="password"
            name="password"
            id="password"
            required
            placeholder="Enter password"
            class="w-full form-input"
          />
        </div>

        <button
          type="submit"
          class="w-full btn-primary flex items-center justify-center gap-2"
        >
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div class="mt-6 p-4 bg-gray-50 rounded text-sm">
        <h4 class="text-gray-900 font-semibold mb-2">Demo Credentials:</h4>
        <div class="space-y-2">
          <button
            type="button"
            onclick="fillOwnerCredentials()"
            class="w-full text-left px-3 py-2 bg-white border border-gray-200 rounded hover:border-primary hover:bg-blue-50 transition-colors"
          >
            <strong class="text-primary">Owner:</strong>
            <span class="text-gray-600">admin / admin123</span>
          </button>
          <button
            type="button"
            onclick="fillStaffCredentials()"
            class="w-full text-left px-3 py-2 bg-white border border-gray-200 rounded hover:border-primary hover:bg-blue-50 transition-colors"
          >
            <strong class="text-primary">Staff:</strong>
            <span class="text-gray-600">staff / staff123</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      function fillOwnerCredentials() {
        document.getElementById("username").value = "admin";
        document.getElementById("password").value = "admin123";
      }

      function fillStaffCredentials() {
        document.getElementById("username").value = "staff";
        document.getElementById("password").value = "staff123";
      }
    </script>

    <style>
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out;
      }

      /* Form Inputs */
      .form-input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        transition: all 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }

      /* Primary Button */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem 1rem;
        background-color: #4f46e5;
        color: white;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.375rem;
        border: none;
        transition: all 0.2s;
        cursor: pointer;
      }

      .btn-primary:hover {
        background-color: #4338ca;
      }

      .btn-primary:active {
        transform: scale(0.98);
      }
    </style>
  </body>
</html>
