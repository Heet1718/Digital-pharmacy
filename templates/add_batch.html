{% extends "base.html" %} {% block title %}Add Batch - MediStore Pro{% endblock
%} {% block content %}

<div class="section-spacing">
  <h1 class="page-title">Add New Batch</h1>
  <p class="page-subtitle">Add stock batch for: {{ product.name }}</p>
</div>

<div class="card max-w-4xl">
  <div class="card-body">
    <form
      method="POST"
      action="{{ url_for('add_batch', product_id=product.id) }}"
    >
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="form-label">Batch Number *</label>
          <input
            type="text"
            name="batch_number"
            required
            placeholder="e.g., BATCH001"
            class="form-input"
          />
          <p class="text-sm text-gray-500 mt-1">
            Unique identifier for this batch
          </p>
        </div>

        <div>
          <label class="form-label">Quantity *</label>
          <input
            type="number"
            name="quantity"
            required
            min="1"
            placeholder="0"
            class="form-input"
          />
        </div>

        <div>
          <label class="form-label">Expiry Date *</label>
          <input type="date" name="expiry_date" required class="form-input" />
        </div>

        <div>
          <label class="form-label">Cost Price per Unit (₹)</label>
          <input
            type="number"
            step="0.01"
            name="cost_price"
            placeholder="0.00"
            class="form-input"
          />
          <p class="text-sm text-gray-500 mt-1">Purchase cost (optional)</p>
        </div>

        <div>
          <label class="form-label">Supplier</label>
          <select name="supplier_id" class="form-input">
            <option value="">Select Supplier (optional)</option>
            {% for supplier in suppliers %}
            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="form-label">Shelf Location</label>
          <input
            type="text"
            name="shelf_location"
            placeholder="e.g., A1"
            class="form-input"
          />
        </div>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <a
          href="{{ url_for('view_batches', product_id=product.id) }}"
          class="btn btn-secondary"
        >
          Cancel
        </a>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Add Batch
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
